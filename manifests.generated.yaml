---
# Source: data-service/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: data-service-settings
  namespace: veronica
data:
    settings.json: "{\n    \"urls\": {\n        \"ds\": \"http://localhost:8000\"\n    },
      \n    \"connectStrings\": {\n        \"pg\": {\n            \"ds\" : \"host='postgres'
      dbname='postgres' user='postgres' password='kofolla'\"\n        }        \n    }\n}"
---
# Source: data-service/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: data-service
  namespace: veronica
spec:
  selector:
    app: data-service
  ports:
  - port: 8000
    targetPort: 8000
  type: LoadBalancer  # Use LoadBalancer or NodePort if external access is needed
---
# Source: data-service/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  namespace: veronica
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-service
  template:
    metadata:
      labels:
        app: data-service
    spec:
      containers:
      - name: data-service
        image: data-service:latest
        imagePullPolicy: Never
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - name: settings
          mountPath: /app/settings.json
          subPath: settings.json
          readOnly: true
      volumes:
      - name: settings
        configMap:
          name: data-service-settings
